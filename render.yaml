# SecOps Universal — Blueprint para Render
# Guia: RENDER-DEPLOY.md

services:
  - type: web
    name: secops-monitor
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerCommand: render-start.sh
    healthCheckPath: /health
    envVars:
      - key: UVICORN_APP
        value: monitor_service:app
      - key: DATA_DIR
        value: /app/data

  - type: web
    name: secops-masking
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerCommand: render-start.sh
    healthCheckPath: /health
    envVars:
      - key: UVICORN_APP
        value: masking_service:app
      - key: DATA_DIR
        value: /app/data

  - type: web
    name: secops-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerCommand: render-start.sh
    healthCheckPath: /health
    envVars:
      - key: UVICORN_APP
        value: main:app
      - key: DATA_DIR
        value: /app/data
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@secops.local
      - key: ADMIN_PASSWORD
        value: "Admin1234!"
      - key: ADMIN_NAME
        value: Administrador SecOps
      - key: MASKING_SERVICE_URL
        fromService:
          type: web
          name: secops-masking
          envVarKey: RENDER_EXTERNAL_URL
      - key: MONITOR_SERVICE_URL
        fromService:
          type: web
          name: secops-monitor
          envVarKey: RENDER_EXTERNAL_URL
