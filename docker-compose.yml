version: '3.8'

services:
  # ----------------------------------------
  # 1. API GATEWAY
  # ----------------------------------------
  api:
    build: .
    container_name: secops_api
    ports:
      - "8000:8000"
    environment:
      - PG_HOST=postgres_db
      - MYSQL_HOST=mysql_db
      - MSSQL_HOST=sqlserver_db
      - MONGO_URI=mongodb://mongodb_db:27017/
      - REDIS_HOST=redis_db
      - NEO4J_URI=bolt://neo4j_db:7687
      - MASKING_SERVICE_URL=http://masking-service:8001
      - MONITOR_SERVICE_URL=http://monitor-service:8002
    depends_on:
      - postgres_db
      - mysql_db
      - sqlserver_db
      - mongodb_db
      - redis_db
      - neo4j_db
      - masking-service
      - monitor-service
    volumes:
      - .:/app # Hot-reload para desarrollo

  # ----------------------------------------
  # 2. MASKING SERVICE
  # ----------------------------------------
  masking-service:
    build: .
    container_name: secops_masking
    command: uvicorn masking_service:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - PG_HOST=postgres_db
      - MYSQL_HOST=mysql_db
      - MSSQL_HOST=sqlserver_db
      - MONGO_URI=mongodb://mongodb_db:27017/
      - REDIS_HOST=redis_db
      - NEO4J_URI=bolt://neo4j_db:7687
    depends_on:
      - postgres_db
      - mysql_db
      - sqlserver_db
      - mongodb_db
      - redis_db
      - neo4j_db
    volumes:
      - .:/app

  # ----------------------------------------
  # 3. MONITOR SERVICE
  # ----------------------------------------
  monitor-service:
    build: .
    container_name: secops_monitor
    command: uvicorn monitor_service:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    volumes:
      - .:/app

  # ----------------------------------------
  # 4. POSTGRESQL
  # ----------------------------------------
  postgres_db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

  # ----------------------------------------
  # 5. MYSQL
  # ----------------------------------------
  mysql_db:
    image: mysql:8
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mysql
    ports:
      - "3306:3306"

  # ----------------------------------------
  # 6. SQL SERVER
  # ----------------------------------------
  sqlserver_db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StrongPassword123!"
    ports:
      - "1433:1433"

  # ----------------------------------------
  # 7. MONGODB
  # ----------------------------------------
  mongodb_db:
    image: mongo:latest
    container_name: mongodb_db
    ports:
      - "27017:27017"

  # ----------------------------------------
  # 8. REDIS
  # ----------------------------------------
  redis_db:
    image: redis:alpine
    container_name: redis_db
    ports:
      - "6379:6379"

  # ----------------------------------------
  # 9. NEO4J
  # ----------------------------------------
  neo4j_db:
    image: neo4j:latest
    container_name: neo4j_db
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474" # Interfaz Browser Neo4j
      - "7687:7687" # Protocolo Bolt para Python
